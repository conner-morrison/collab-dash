# Production-flavoured stack: PostgreSQL + Redis + FastAPI + Next.js.
#
# The app also runs with zero infrastructure for local dev (SQLite + in-process
# realtime) — see README. This compose file demonstrates the full stack from the
# requirements: Postgres for persistence, Redis available for cache / pub-sub.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dashboard
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/dashboard
      JWT_SECRET: please-change-this-secret
      FRONTEND_ORIGIN: http://localhost:3000
      BROADCASTER: memory
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8010:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8010
        NEXT_PUBLIC_WS_URL: ws://localhost:8010
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
